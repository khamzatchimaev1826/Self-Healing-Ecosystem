services:
  postgres:
    image: postgres:16-alpine
    container_name: ecosystem-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecosystem
    volumes:
      - ecosystem_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecosystem"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecosystem_pg_data:
