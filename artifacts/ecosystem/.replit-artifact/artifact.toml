kind = "web"
previewPath = "/"
title = "Self-Healing Ecosystem Model"
version = "1.0.0"
id = "artifacts/ecosystem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21802

[services.development]
run = "pnpm --filter @workspace/ecosystem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecosystem", "run", "build" ]
publicDir = "artifacts/ecosystem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21802"
BASE_PATH = "/"
